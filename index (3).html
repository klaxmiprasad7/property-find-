<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PropFind India — Smart Property Search</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d14;--ink2:#1a1a2e;--slate:#64748b;--muted:#94a3b8;
  --border:#e2e8f0;--surface:#f8fafc;--card:#fff;
  --v:#6366f1;--vd:#4f46e5;--vl:#818cf8;--vx:#eef2ff;--vxx:#e0e7ff;
  --go:#10b981;--gox:#d1fae5;--amber:#f59e0b;--amberx:#fef3c7;
  --red:#ef4444;--redx:#fee2e2;--orange:#f97316;--orangex:#fff7ed;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;--nav:64px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--surface);color:var(--ink);overflow-x:hidden}
button,input,select,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--vl);border-radius:3px}
::selection{background:var(--vxx);color:var(--vd)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-400%}100%{background-position:400%}}
@keyframes slideIn{from{transform:translateX(120px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes scaleIn{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.fade-up{animation:fadeUp .45s ease both}
.scale-in{animation:scaleIn .24s ease both}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav);z-index:900;transition:all .3s}
.nav-glass{background:rgba(255,255,255,.96);backdrop-filter:blur(14px);box-shadow:0 1px 0 rgba(0,0,0,.08),0 4px 20px rgba(0,0,0,.04)}
.nav-clear{background:transparent}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;text-decoration:none}
.nav-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--v),#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.nav-logo-text{font-size:18px;font-weight:800;color:var(--ink2);letter-spacing:-.03em}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-link{background:none;border:none;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.nav-link.active{background:rgba(99,102,241,.12);color:var(--v)}
.nav-link.white{color:#fff}
.nav-link.dark{color:var(--ink2)}
.nav-user{display:flex;align-items:center;gap:8px}
.nav-avatar{width:26px;height:26px;background:linear-gradient(135deg,var(--v),#8b5cf6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:800}
.nav-user-btn{display:flex;align-items:center;gap:8px;background:rgba(99,102,241,.08);border:none;border-radius:10px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:700}
.hamburger{background:none;border:none;font-size:22px;cursor:pointer;display:none}
.mobile-menu{background:#fff;border-top:1px solid var(--border);padding:12px 24px 20px;display:none}
.mobile-menu.open{display:block}
.mobile-link{display:block;width:100%;text-align:left;background:none;border:none;color:var(--slate);font-weight:700;font-size:15px;padding:11px 0;cursor:pointer;border-bottom:1px solid var(--border)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:12px;border:none;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none}
.btn:disabled{opacity:.6;cursor:not-allowed;pointer-events:none}
.btn-primary{background:linear-gradient(135deg,var(--v),#8b5cf6);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.32)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.45)}
.btn-success{background:linear-gradient(135deg,#059669,var(--go));color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.28)}
.btn-success:hover{transform:translateY(-2px)}
.btn-orange{background:linear-gradient(135deg,#ea580c,var(--orange));color:#fff;box-shadow:0 4px 14px rgba(249,115,22,.28)}
.btn-secondary{background:#fff;color:var(--v);border:2px solid var(--v)}
.btn-secondary:hover{background:var(--vx)}
.btn-ghost{background:transparent;color:var(--slate);border:2px solid var(--border)}
.btn-ghost:hover{border-color:var(--v);color:var(--v);background:var(--vx)}
.btn-danger{background:var(--redx);color:var(--red);border:2px solid #fecaca}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:9px}
.btn-lg{padding:13px 28px;font-size:15px;border-radius:14px}
.btn-xl{padding:16px 44px;font-size:17px;border-radius:16px}

/* CARDS */
.card{background:var(--card);border-radius:20px;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.card-lift{transition:all .25s}
.card-lift:hover{box-shadow:0 16px 48px rgba(99,102,241,.16);transform:translateY(-5px)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-v{background:var(--vxx);color:var(--vd)}
.badge-go{background:var(--gox);color:#065f46}
.badge-amber{background:var(--amberx);color:#92400e}
.badge-red{background:var(--redx);color:#991b1b}
.badge-em{background:#fce7f3;color:#9d174d}
.badge-orange{background:var(--orangex);color:#c2410c}
.badge-dark{background:rgba(0,0,0,.55);color:#fff;backdrop-filter:blur(6px)}
.badge-go2{background:#ecfdf5;color:#047857}

/* INPUTS */
.input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:12px;font-size:14px;outline:none;transition:border .2s,box-shadow .2s;background:#fff;color:var(--ink)}
.input:focus{border-color:var(--v);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.input-wrap{position:relative}
.input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:15px}
.input-pad{padding-left:38px}
.label{display:block;font-size:11px;font-weight:800;color:var(--ink2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.field-err{font-size:12px;color:var(--red);margin-top:4px}
.req{color:var(--red)}

/* SKELETON */
.skel{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:400%;animation:shimmer 1.6s infinite;border-radius:8px}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid;transition:all .15s}
.chip-off{background:#fff;border-color:var(--border);color:var(--slate)}
.chip-off:hover{border-color:var(--vl);color:var(--v)}
.chip-on{background:var(--vxx);border-color:var(--v);color:var(--vd)}

/* PROGRESS */
.prog{height:6px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .9s ease}

/* TABS */
.tabs{display:flex;background:var(--surface);border-radius:12px;padding:4px;gap:3px}
.tab{flex:1;padding:9px 16px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.tab-on{background:var(--v);color:#fff;box-shadow:0 2px 10px rgba(99,102,241,.35)}
.tab-off{background:transparent;color:var(--slate)}
.tab-off:hover{background:#fff;color:var(--ink)}

/* GRID */
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
.g2-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.states-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}

/* TOAST */
#toasts{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:14px;min-width:280px;max-width:360px;color:#fff;font-weight:600;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.22);animation:slideIn .3s ease;pointer-events:all}
.toast-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;padding:0;line-height:1;margin-left:auto;flex-shrink:0}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(10,10,20,.65);backdrop-filter:blur(8px);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay-card{width:100%;max-width:480px;margin-top:20px}

/* UPLOAD ZONE */
.upload-zone{border:2.5px dashed var(--border);border-radius:20px;padding:32px;text-align:center;cursor:pointer;background:var(--surface);transition:all .2s}
.upload-zone:hover{border-color:var(--v);background:var(--vx)}

/* SECTION LABEL */
.section-label{display:inline-block;background:var(--vxx);color:var(--vd);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}

/* SPINNER */
.spinner{display:inline-block;border:2.5px solid rgba(99,102,241,.2);border-top-color:var(--v);border-radius:50%;animation:spin .7s linear infinite}

/* SCORE RING */
.score-text{font-weight:800;text-align:center;line-height:1;font-feature-settings:'mono'}

/* FOOTER */
footer{background:#08080f;color:#64748b;padding:64px 24px 32px;margin-top:80px}
.footer-inner{max-width:1200px;margin:0 auto}
.footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:44px;margin-bottom:56px}
.footer-bottom{border-top:1px solid #1a1a2e;padding-top:24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:12px}
.footer-link{background:none;border:none;color:#475569;font-size:13px;cursor:pointer;margin-bottom:9px;padding:0;text-align:left;transition:color .2s;display:block}
.footer-link:hover{color:#fff}

@media(max-width:768px){
  .hide-mob{display:none!important}
  .hamburger{display:flex!important;align-items:center}
  .g3{grid-template-columns:1fr}
  .g2-col{grid-template-columns:1fr}
  .states-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
@media(min-width:769px){.hide-desk{display:none!important}}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
    <div class="spinner" style="width:44px;height:44px"></div>
    <p style="color:var(--slate);font-size:15px">Loading PropFind India...</p>
  </div>
</div>
<div id="toasts"></div>

<!-- React 18 + ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// PROPFIND INDIA — COMPLETE SELF-CONTAINED APPLICATION
// Pre-compiled JavaScript (no Babel transpiler needed)
// ═══════════════════════════════════════════════════════

const e = React.createElement;
const {useState, useEffect, useRef, useCallback, useMemo, createContext, useContext} = React;

const API = 'http://localhost:3001/api';
const AuthCtx = createContext(null);
const useAuth = () => useContext(AuthCtx);

// ─── TOAST SYSTEM ─────────────────────────────────────
let _toastFn = null;
const toast = (msg, type='info') => _toastFn && _toastFn(msg, type);
const TOAST_BG = {
  success:'linear-gradient(135deg,#059669,#10b981)',
  error:'linear-gradient(135deg,#dc2626,#ef4444)',
  info:'linear-gradient(135deg,#2563eb,#6366f1)',
  warning:'linear-gradient(135deg,#d97706,#f59e0b)'
};

function Toasts() {
  const [list, setList] = useState([]);
  useEffect(() => {
    _toastFn = (msg, type='info') => {
      const id = Date.now() + Math.random();
      setList(l => [...l, {id, msg, type}]);
      setTimeout(() => setList(l => l.filter(t => t.id !== id)), 4500);
    };
  }, []);
  return e('div', {id:'_toasts', style:{position:'fixed',top:18,right:18,zIndex:9999,display:'flex',flexDirection:'column',gap:10}},
    list.map(t => e('div', {key:t.id, className:'toast', style:{background:TOAST_BG[t.type]}},
      e('span', {style:{fontSize:18}}, t.type==='success'?'✓':t.type==='error'?'✕':t.type==='warning'?'⚠':'ℹ'),
      e('span', {style:{flex:1,fontSize:14}}, t.msg),
      e('button', {className:'toast-close', onClick:()=>setList(l=>l.filter(x=>x.id!==t.id))}, '✕')
    ))
  );
}

// ─── API HELPER ────────────────────────────────────────
async function apiFetch(path, opts={}) {
  const token = localStorage.getItem('pf_token');
  try {
    const res = await fetch(API + path, {
      ...opts,
      headers: {'Content-Type':'application/json', ...(token?{Authorization:'Bearer '+token}:{}), ...opts.headers},
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  } catch(err) {
    if (err.message.includes('fetch')) throw new Error('Cannot connect to server. Run: node server/index.js');
    throw err;
  }
}

// ─── CONSTANTS ─────────────────────────────────────────
const AMN = {pool:'🏊',gym:'💪',garden:'🌳',parking:'🚗',security:'🔒',elevator:'🛗'};
const TYPE_CLS = {Apartment:'badge-v',Villa:'badge-go',Penthouse:'badge-em',Studio:'badge-amber',Bungalow:'badge-red','Row House':'badge-orange',Land:'badge-dark','Agricultural Land':'badge-go2',Commercial:'badge-dark'};
const TYPE_ICO = {Apartment:'🏢',Villa:'🏡',Penthouse:'🌆',Studio:'🏠',Bungalow:'🏘️','Row House':'🏚️',Land:'🌍','Agricultural Land':'🌾',Commercial:'🏪'};
const PROP_TYPES = ['Apartment','Villa','Penthouse','Studio','Bungalow','Row House','Land','Agricultural Land','Commercial'];
const ALL_STATES = ['Andhra Pradesh','Arunachal Pradesh','Assam','Bihar','Chhattisgarh','Goa','Gujarat','Haryana','Himachal Pradesh','Jharkhand','Karnataka','Kerala','Madhya Pradesh','Maharashtra','Manipur','Meghalaya','Mizoram','Nagaland','Odisha','Punjab','Rajasthan','Sikkim','Tamil Nadu','Telangana','Tripura','Uttar Pradesh','Uttarakhand','West Bengal','Delhi','Jammu & Kashmir','Ladakh','Andaman & Nicobar','Chandigarh','Dadra & NH','Lakshadweep','Puducherry'];
const STATE_EMO = {Goa:'🏖️',Kerala:'🌴',Rajasthan:'🏜️','Himachal Pradesh':'⛰️',Uttarakhand:'⛰️',Ladakh:'🏔️','Jammu & Kashmir':'🏔️','Andaman & Nicobar':'🏝️',Delhi:'🌆',Maharashtra:'🌃',Guwahati:'🌿'};

const fmt = n => {
  if (!n || n === 0) return 'N/A';
  if (n >= 10000000) return '₹' + (n/10000000).toFixed(2) + ' Cr';
  return '₹' + (n/100000).toFixed(1) + ' L';
};
const fmtRent = n => '₹' + n.toLocaleString() + '/mo';

// ─── SPINNER ────────────────────────────────────────────
function Spinner({size=20, color='var(--v)'}) {
  return e('span', {className:'spinner', style:{width:size, height:size, borderTopColor:color}});
}

// ─── SCORE RING ─────────────────────────────────────────
function ScoreRing({score, size=60}) {
  const r = size/2 - 6, circ = 2*Math.PI*r;
  const dash = (score/100) * circ;
  const color = score >= 75 ? 'var(--go)' : score >= 50 ? 'var(--amber)' : 'var(--red)';
  return e('div', {style:{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}},
    e('svg', {width:size, height:size, style:{transform:'rotate(-90deg)'}},
      e('circle', {cx:size/2, cy:size/2, r, fill:'none', stroke:'#e5e7eb', strokeWidth:5}),
      e('circle', {cx:size/2, cy:size/2, r, fill:'none', stroke:color, strokeWidth:5, strokeDasharray:`${dash} ${circ}`, strokeLinecap:'round', style:{transition:'stroke-dasharray .9s ease'}})
    ),
    e('div', {style:{position:'absolute',textAlign:'center'}},
      e('div', {style:{fontSize:size*.28, fontWeight:800, color, lineHeight:1}}, score)
    )
  );
}

// ─── STARS ─────────────────────────────────────────────
function Stars({rating, size=13}) {
  return e('span', {style:{display:'inline-flex',gap:1,fontSize:size}},
    [1,2,3,4,5].map(i => e('span', {key:i, style:{color:i<=Math.round(rating)?'#f59e0b':'#d1d5db'}}, '★'))
  );
}

// ─── SKELETON CARD ──────────────────────────────────────
function SkeletonCard() {
  return e('div', {className:'card', style:{overflow:'hidden'}},
    e('div', {className:'skel', style:{height:215}}),
    e('div', {style:{padding:'18px 20px'}},
      [90,65,80].map((w,i) => e('div', {key:i, className:'skel', style:{height:13,width:w+'%',margin:'0 0 10px'}})),
      e('div', {style:{display:'flex',gap:8,marginTop:16}},
        e('div', {className:'skel', style:{height:38,flex:1,borderRadius:10}}),
        e('div', {className:'skel', style:{height:38,width:38,borderRadius:10}})
      )
    )
  );
}

// ─── PROPERTY CARD ──────────────────────────────────────
function PropertyCard({prop, onView, onCompare, inComp}) {
  const {user, savedIds, toggleSave} = useAuth();
  const [saving, setSaving] = useState(false);
  const [hovered, setHovered] = useState(false);
  const saved = savedIds.includes(prop.id);
  const isRent = prop.category === 'rent';
  const price = isRent ? fmtRent(prop.price) : fmt(prop.price);

  const handleSave = async ev => {
    ev.stopPropagation();
    if (!user) { toast('Sign in to save properties', 'warning'); return; }
    setSaving(true);
    try { await toggleSave(prop.id); toast(saved?'Removed from saved':'❤ Saved!', saved?'info':'success'); }
    catch { toast('Failed to save', 'error'); }
    finally { setSaving(false); }
  };

  return e('div', {
    className:'card fade-up',
    style:{overflow:'hidden', cursor:'pointer', transition:'all .25s', transform:hovered?'translateY(-5px)':'translateY(0)', boxShadow:hovered?'0 16px 48px rgba(99,102,241,.16)':'0 2px 16px rgba(0,0,0,.06)'},
    onMouseEnter:()=>setHovered(true), onMouseLeave:()=>setHovered(false)
  },
    // Image
    e('div', {style:{position:'relative',height:215,overflow:'hidden'}},
      e('img', {src:prop.image, alt:prop.title, style:{width:'100%',height:'100%',objectFit:'cover',display:'block',transition:'transform .45s',transform:hovered?'scale(1.07)':'scale(1)'}, onError:ev=>ev.target.src='https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=600&q=70'}),
      e('div', {style:{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%)'}}),
      // Badges top-left
      e('div', {style:{position:'absolute',top:12,left:12,display:'flex',gap:6,flexWrap:'wrap'}},
        e('span', {className:'badge '+(TYPE_CLS[prop.type]||'badge-v')}, (TYPE_ICO[prop.type]||'🏠')+' '+prop.type),
        isRent && e('span', {className:'badge badge-orange'}, 'RENT'),
        prop.isUserListing && e('span', {className:'badge badge-go'}, '✓ Listed')
      ),
      // Score + save
      e('div', {style:{position:'absolute',top:10,right:12,display:'flex',gap:6,alignItems:'center'}},
        e(ScoreRing, {score:prop.scores?.total||0, size:46}),
        e('button', {onClick:handleSave, style:{width:34,height:34,borderRadius:10,background:'rgba(255,255,255,.92)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,cursor:'pointer',color:saved?'var(--red)':'var(--slate)',flexShrink:0}},
          saving ? e(Spinner, {size:14}) : (saved ? '❤' : '♡')
        )
      ),
      // Price + state
      e('div', {style:{position:'absolute',bottom:12,left:14,right:14,display:'flex',justifyContent:'space-between',alignItems:'flex-end'}},
        e('div', {style:{fontSize:22,fontWeight:800,color:'#fff',textShadow:'0 2px 8px rgba(0,0,0,.5)',letterSpacing:'-.04em'}}, price),
        e('span', {className:'badge badge-dark', style:{fontSize:10}}, prop.state)
      )
    ),
    // Body
    e('div', {style:{padding:'16px 18px 18px'}},
      e('h3', {style:{fontSize:15,fontWeight:700,color:'var(--ink)',margin:'0 0 5px',lineHeight:1.3}}, prop.title),
      e('div', {style:{display:'flex',alignItems:'center',gap:4,color:'var(--slate)',fontSize:13,marginBottom:12}},
        e('span', {style:{color:'var(--v)'}}, '📍'),
        e('span', {style:{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, prop.location),
        e('span', {style:{marginLeft:4,background:'var(--surface)',borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:700,color:'var(--slate)',flexShrink:0}}, prop.distance+'km')
      ),
      // Stats
      e('div', {style:{display:'flex',gap:12,fontSize:12,color:'var(--slate)',padding:'9px 0',borderTop:'1px solid #f1f5f9',borderBottom:'1px solid #f1f5f9',marginBottom:12}},
        prop.type!=='Land'&&prop.type!=='Agricultural Land'&&prop.type!=='Commercial' && [
          e('span', {key:'bed', style:{display:'flex',alignItems:'center',gap:4}}, e('span',{},'🛏'), e('span',{style:{fontWeight:600}}, prop.bedrooms+' BHK')),

// ─── AUTH PAGE ───────────────────────────────────────────
function AuthPage({nav}) {
  const {login} = useAuth();
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({name:'',email:'',password:'',confirm:''});
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);

  const validate = () => {
    const errs = {};
    if (mode==='register' && !form.name.trim()) errs.name = 'Name required';
    if (!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) errs.email = 'Valid email required';
    if (form.password.length < 6) errs.password = 'Min 6 characters';
    if (mode==='register' && form.password!==form.confirm) errs.confirm = "Passwords don't match";
    return errs;
  };

  const submit = async () => {
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); toast('Fix the errors below','error'); return; }
    setLoading(true);
    try {
      const data = await apiFetch('/auth/'+(mode==='login'?'login':'register'), {method:'POST',body:form});
      localStorage.setItem('pf_token', data.token);
      login(data.user);
      toast('Welcome'+(mode==='register'?' aboard':' back')+', '+data.user.name+'! 🎉', 'success');
      nav('search');
    } catch(err) { toast(err.message,'error'); }
    finally { setLoading(false); }
  };

  const field = (label, key, type='text', ph='', required=true) =>
    e('div', {style:{marginBottom:18}},
      e('label', {className:'label'}, label, required&&e('span',{className:'req'},' *')),
      e('input', {className:'input', type, value:form[key], placeholder:ph,
        onChange:ev=>{setForm({...form,[key]:ev.target.value});setErrors({...errors,[key]:''}); },
        onKeyDown:ev=>ev.key==='Enter'&&submit(),
        style:{borderColor:errors[key]?'var(--red)':''}}),
      errors[key] && e('p', {className:'field-err'}, '⚠ '+errors[key])
    );

  return e('div', {style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'80px 20px',background:'linear-gradient(160deg,#f0f4ff,#faf5ff,#f0fdf4)',position:'relative',overflow:'hidden'}},
    e('div', {className:'card scale-in', style:{width:'100%',maxWidth:440,padding:'42px 38px'}},
      e('div', {style:{textAlign:'center',marginBottom:32}},
        e('div', {style:{width:62,height:62,background:'linear-gradient(135deg,var(--v),#8b5cf6)',borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:28}}, '🏠'),
        e('h1', {style:{fontSize:26,fontWeight:800,color:'var(--ink)',margin:0,letterSpacing:'-.03em'}}, mode==='login'?'Welcome Back':'Create Account'),
        e('p', {style:{color:'var(--slate)',fontSize:14,margin:'7px 0 0'}}, mode==='login'?'Sign in to search, save & list properties':'Join PropFind — free forever')
      ),
      e('div', {className:'tabs', style:{marginBottom:28}},
        [['login','Sign In'],['register','Register']].map(([m,l]) =>
          e('button', {key:m, className:'tab '+(mode===m?'tab-on':'tab-off'), onClick:()=>{setMode(m);setErrors({});setForm({name:'',email:'',password:'',confirm:''});}}, l)
        )
      ),
      mode==='register' && field('Full Name','name','text','Your full name'),
      field('Email Address','email','email','you@example.com'),
      field('Password','password','password','••••••••'),
      mode==='register' && field('Confirm Password','confirm','password','••••••••'),
      mode==='login' && e('div', {style:{textAlign:'right',marginTop:-10,marginBottom:20}},
        e('span', {style:{fontSize:13,color:'var(--v)',cursor:'pointer',fontWeight:700}}, 'Forgot password?')

function SearchPage({initQ, compareList, setCompareList, nav, setDetail}) {
  const [props, setProps] = useState([]);
  const [total, setTotal] = useState(0);
  const [loading, setLoading] = useState(true);
  const [viewMode, setViewMode] = useState('grid');
  const [showFilters, setShowFilters] = useState(false);
  const [filters, setFilters] = useState({
    location: initQ?.location||'', budget: initQ?.budget ? String(initQ.budget/100000) : '',
    type: initQ?.type||'', category: initQ?.category||'', state:'',
    minPrice:'', maxPrice:'', maxDist:'', amenities:[], sort:'score'
  });
  const timer = useRef(null);

  const load = useCallback(async f => {
    setLoading(true);
    try {
      const p = new URLSearchParams();
      if (f.location) p.set('location', f.location);
      if (f.budget) p.set('budget', f.budget*100000);
      if (f.type) p.set('type', f.type);
      if (f.category) p.set('category', f.category);
      if (f.state) p.set('state', f.state);
      if (f.minPrice) p.set('minPrice', f.minPrice*100000);
      if (f.maxPrice) p.set('maxPrice', f.maxPrice*100000);
      if (f.maxDist) p.set('maxDist', f.maxDist);
      if (f.amenities.length) p.set('amenities', f.amenities.join(','));
      p.set('sort', f.sort);
      const data = await apiFetch('/properties?' + p);
      setProps(data.properties); setTotal(data.total);
    } catch(err) { toast(err.message, 'error'); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => {
    clearTimeout(timer.current);
    timer.current = setTimeout(() => load(filters), 350);
  }, [filters, load]);

  const toggleCompare = prop => {
    if (compareList.find(p => p.id===prop.id)) { setCompareList(compareList.filter(p=>p.id!==prop.id)); toast('Removed','info'); return; }
    if (compareList.length >= 3) { toast('Max 3 for comparison','error'); return; }
    setCompareList([...compareList, prop]); toast(prop.title+' added ✓','success');
  };
  const toggleAm = a => setFilters(f => ({...f, amenities: f.amenities.includes(a)?f.amenities.filter(x=>x!==a):[...f.amenities,a]}));
  const activeF = [filters.type,filters.category,filters.state,filters.minPrice,filters.maxPrice,filters.maxDist,...filters.amenities].filter(Boolean).length;
  const clearF = () => setFilters(f => ({...f,type:'',category:'',state:'',minPrice:'',maxPrice:'',maxDist:'',amenities:[]}));

  const inputSt = {background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.2)',color:'#fff'};

  return e('div', {style:{minHeight:'100vh',paddingTop:'var(--nav)'}},
    // Top bar
    e('div', {style:{background:'linear-gradient(135deg,var(--ink2),#252542)',padding:'16px 24px',boxShadow:'0 4px 20px rgba(0,0,0,.2)'}},
      e('div', {style:{maxWidth:1280,margin:'0 auto',display:'flex',flexWrap:'wrap',gap:10,alignItems:'center'}},
        e('div', {className:'input-wrap', style:{flex:'1 1 200px'}},
          e('span', {className:'input-icon'}, '🔍'),
          e('input', {className:'input input-pad', placeholder:'State, city, area…', value:filters.location, onChange:ev=>setFilters({...filters,location:ev.target.value}), style:inputSt})
        ),
        e('div', {style:{flex:'0 0 155px',position:'relative'}},
          e('span', {style:{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'#a78bfa',fontWeight:800,pointerEvents:'none'}}, '₹'),
          e('input', {className:'input', placeholder:'Budget (L)', type:'number', value:filters.budget, onChange:ev=>setFilters({...filters,budget:ev.target.value}), style:{...inputSt,paddingLeft:26}})
        ),
        e('select', {className:'input', value:filters.sort, onChange:ev=>setFilters({...filters,sort:ev.target.value}), style:{...inputSt,flex:'0 0 148px'}},
          [['score','Best Score'],['price_asc','Price ↑'],['price_desc','Price ↓'],['distance','Nearest'],['popular','Popular'],['newest','Newest']].map(([v,l])=>e('option',{key:v,value:v},l))
        ),
        e('button', {className:'btn btn-ghost btn-sm', onClick:()=>setShowFilters(!showFilters), style:{color:'#fff',borderColor:'rgba(255,255,255,.3)',position:'relative',flexShrink:0}},
          '⚙ Filters',
          activeF > 0 && e('span', {style:{position:'absolute',top:-6,right:-6,background:'var(--v)',color:'#fff',width:18,height:18,borderRadius:'50%',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800}}, activeF)
        ),
        e('div', {style:{display:'flex',background:'rgba(255,255,255,.1)',borderRadius:10,padding:3,gap:2,flexShrink:0}},
          [['grid','▦'],['list','≡']].map(([v,ic]) => e('button', {key:v, onClick:()=>setViewMode(v), style:{background:viewMode===v?'var(--v)':'transparent',border:'none',color:'#fff',borderRadius:8,padding:'6px 11px',cursor:'pointer',fontSize:15,fontWeight:700}}, ic))

    ),

    // Filter panel
    showFilters && e('div', {style:{background:'#fff',borderBottom:'1px solid var(--border)',padding:'20px 24px',boxShadow:'0 4px 16px rgba(0,0,0,.05)'}},
      e('div', {style:{maxWidth:1280,margin:'0 auto',display:'flex',flexWrap:'wrap',gap:24,alignItems:'flex-start'}},
        e('div', {style:{flex:'1 1 200px',minWidth:180}},
          e('label', {className:'label'}, 'State / UT'),
          e('select', {className:'input', value:filters.state, onChange:ev=>setFilters({...filters,state:ev.target.value})},

            ALL_STATES.map(s => e('option', {key:s,value:s}, s))
          )
        ),
        e('div', {},
          e('label', {className:'label'}, 'Category'),
          e('div', {style:{display:'flex',gap:6}},
            [['','All'],['buy','🏠 Buy'],['rent','🔑 Rent']].map(([v,l]) =>
              e('button', {key:v, className:'chip '+(filters.category===v?'chip-on':'chip-off'), onClick:()=>setFilters({...filters,category:v})}, l)
            )
          )
        ),
        e('div', {style:{flex:'1 1 260px'}},
          e('label', {className:'label'}, 'Property Type'),
          e('div', {style:{display:'flex',flexWrap:'wrap',gap:5}},
            ['','Apartment','Villa','Penthouse','Studio','Bungalow','Row House','Land','Agricultural Land','Commercial'].map(t =>

            )
          )
        ),
        e('div', {},
          e('label', {className:'label'}, 'Price Range (₹L)'),
          e('div', {style:{display:'flex',gap:8,alignItems:'center'}},
            e('input', {className:'input', placeholder:'Min', type:'number', value:filters.minPrice, onChange:ev=>setFilters({...filters,minPrice:ev.target.value}), style:{width:82}}),
            e('span', {style:{color:'var(--muted)',fontWeight:700}}, '—'),
            e('input', {className:'input', placeholder:'Max', type:'number', value:filters.maxPrice, onChange:ev=>setFilters({...filters,maxPrice:ev.target.value}), style:{width:82}})
          )
        ),
        e('div', {},
          e('label', {className:'label'}, 'Max Distance (km)'),
          e('input', {className:'input', placeholder:'e.g. 10', type:'number', value:filters.maxDist, onChange:ev=>setFilters({...filters,maxDist:ev.target.value}), style:{width:95}})
        ),
        e('div', {},
          e('label', {className:'label'}, 'Amenities'),
          e('div', {style:{display:'flex',flexWrap:'wrap',gap:5}},
            ['pool','gym','garden','parking','security','elevator'].map(a =>
              e('button', {key:a, className:'chip '+(filters.amenities.includes(a)?'chip-on':'chip-off'), onClick:()=>toggleAm(a), style:{textTransform:'capitalize',fontSize:11}}, (AMN[a]||'•')+' '+a)
            )

    ),

    // Results

// ─── SELL PAGE ────────────────────────────────────────────
function SellPage({nav}) {
  const {user} = useAuth();
  const [form, setForm] = useState({title:'',price:'',location:'',state:'',city:'',type:'Apartment',category:'buy',bedrooms:'',bathrooms:'',area:'',distance:'',description:'',yearBuilt:'',floor:'',facing:'',phone:'',amenities:[],tags:'',landArea:'',imageUrl1:'',imageUrl2:'',imageUrl3:''});
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [submitted, setSubmitted] = useState(null);
  const fileRef = useRef();
  const [fileImages, setFileImages] = useState([]);

  const setF = (k,v) => setForm(f => ({...f,[k]:v}));
  const toggleAm = a => setF('amenities', form.amenities.includes(a)?form.amenities.filter(x=>x!==a):[...form.amenities,a]);

  const validate = () => {
    const errs = {};
    if (!form.title.trim()) errs.title='Title required';
    if (!form.price||parseInt(form.price)<=0) errs.price='Valid price required';
    if (!form.location.trim()) errs.location='Location required';
    if (!form.state) errs.state='Select a state';
    if (!form.city.trim()) errs.city='City required';
    if (!form.description.trim()||form.description.length<20) errs.description='Min 20 characters';
    if (!form.phone.trim()) errs.phone='Phone required';
    return errs;
  };

  const handleFiles = ev => {
    const files = Array.from(ev.target.files);
    files.slice(0,3).forEach(file => {
      const reader = new FileReader();
      reader.onload = e2 => setFileImages(prev => [...prev.filter(u=>u), e2.target.result].slice(0,3));
      reader.readAsDataURL(file);
    });
    toast(files.length+' photo(s) loaded!','success');
  };

  const submit = async () => {
    if (!user) { toast('Sign in to list your property','warning'); nav('auth'); return; }
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); toast('Please fix the errors','error'); return; }
    setLoading(true);
    try {
      const urlImages = [form.imageUrl1, form.imageUrl2, form.imageUrl3].filter(u=>u.trim());
      const allImages = [...fileImages, ...urlImages].filter(Boolean).slice(0,4);
      const data = await apiFetch('/list-property', {method:'POST', body:{
        ...form,
        price: form.category==='rent' ? parseInt(form.price) : parseInt(form.price)*100000,
        images: allImages,
        bedrooms: parseInt(form.bedrooms)||0,
        bathrooms: parseInt(form.bathrooms)||0,
        area: parseInt(form.area)||0,
        distance: parseFloat(form.distance)||5,
        landArea: parseInt(form.landArea)||null,
        tags: form.tags.split(',').map(t=>t.trim()).filter(Boolean),
      }});
      setSubmitted(data);
      toast('🎉 Property listed successfully!','success');
    } catch(err) { toast(err.message,'error'); }
    finally { setLoading(false); }
  };

  if (!user) return e('div', {style:{minHeight:'100vh',paddingTop:120,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,textAlign:'center',padding:'120px 24px'}},
    e('div', {style:{fontSize:64}}, '🔐'),
    e('h2', {style:{fontSize:26,fontWeight:800}}, 'Sign In to List Property'),
    e('p', {style:{color:'var(--slate)',maxWidth:340,lineHeight:1.7}}, 'You need to be signed in to list your property or land on PropFind India.'),
    e('button', {className:'btn btn-primary btn-lg', onClick:()=>nav('auth')}, 'Sign In / Register')
  );

  if (submitted) return e('div', {style:{minHeight:'100vh',paddingTop:120,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:20,textAlign:'center',padding:'120px 24px',background:'linear-gradient(160deg,#f0fdf4,#ecfdf5)'}},
    e('div', {style:{fontSize:80}}, '🎉'),
    e('h2', {style:{fontSize:32,fontWeight:900,color:'var(--ink)',letterSpacing:'-.03em'}}, 'Property Listed Successfully!'),
    e('p', {style:{color:'var(--slate)',maxWidth:400,fontSize:16,lineHeight:1.7}}, 'Your "'+submitted.title+'" is now live and visible to buyers across India.'),
    e('div', {className:'card', style:{padding:'24px 32px',maxWidth:380,width:'100%'}},
      e('div', {style:{display:'flex',gap:14,alignItems:'center',marginBottom:14}},
        e('img', {src:submitted.image, alt:'', style:{width:72,height:72,objectFit:'cover',borderRadius:12}, onError:ev=>ev.target.style.display='none'}),
        e('div', {style:{textAlign:'left'}},
          e('div', {style:{fontWeight:700,color:'var(--ink)',fontSize:15}}, submitted.title),
          e('div', {style:{color:'var(--slate)',fontSize:13,marginTop:2}}, submitted.location),
          e('div', {style:{fontWeight:800,color:'var(--v)',fontSize:17,marginTop:4}}, submitted.category==='rent'?fmtRent(submitted.price):fmt(submitted.price))
        )
      ),
      e('div', {style:{background:'var(--gox)',borderRadius:10,padding:'10px 14px',fontSize:12,color:'#065f46',fontWeight:700}}, '✓ Live — ID: '+submitted.id)
    ),
    e('div', {style:{display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center'}},
      e('button', {className:'btn btn-primary btn-lg', onClick:()=>nav('search')}, '🔍 Browse All'),
      e('button', {className:'btn btn-ghost btn-lg', onClick:()=>nav('profile')}, '👤 My Listings'),

    )

// ─── DETAILS PAGE ─────────────────────────────────────────
function DetailsPage({propId, nav, compareList, setCompareList}) {
  const {user, savedIds, toggleSave} = useAuth();
  const [prop, setProp] = useState(null);
  const [loading, setLoading] = useState(true);
  const [imgIdx, setImgIdx] = useState(0);
  const [showEnq, setShowEnq] = useState(false);
  const [showRev, setShowRev] = useState(false);
  const [enq, setEnq] = useState({message:'',visitDate:''});
  const [rev, setRev] = useState({rating:5,comment:''});
  const [submitting, setSubmitting] = useState(false);

  const saved = savedIds.includes(propId);
  const inComp = !!compareList.find(p=>p.id===propId);

  useEffect(() => {
    setLoading(true); setImgIdx(0);
    apiFetch('/properties/'+propId).then(d=>{setProp(d);setLoading(false);}).catch(()=>setLoading(false));
  }, [propId]);

  const toggleComp = () => {
    if (inComp) { setCompareList(compareList.filter(p=>p.id!==propId)); toast('Removed','info'); return; }
    if (compareList.length>=3) { toast('Max 3','error'); return; }
    if (prop) { setCompareList([...compareList,prop]); toast('Added ✓','success'); }
  };

  const submitEnq = async () => {
    if (!user) { toast('Sign in first','warning'); return; }
    if (!enq.message.trim()) { toast('Write a message','error'); return; }
    setSubmitting(true);
    try { await apiFetch('/enquiries',{method:'POST',body:{propertyId:propId,...enq}}); toast('Enquiry sent! Agent will contact you 📞','success'); setShowEnq(false); setEnq({message:'',visitDate:''}); }
    catch(err) { toast(err.message,'error'); }
    finally { setSubmitting(false); }
  };

  const submitRev = async () => {
    if (!user) { toast('Sign in first','warning'); return; }
    if (!rev.comment.trim()) { toast('Write a review','error'); return; }
    setSubmitting(true);
    try {
      await apiFetch('/reviews',{method:'POST',body:{propertyId:propId,...rev}});
      toast('Review posted! 🌟','success'); setShowRev(false);
      const fresh = await apiFetch('/properties/'+propId); setProp(fresh);
    } catch(err) { toast(err.message,'error'); }
    finally { setSubmitting(false); }
  };

  if (loading) return e('div', {style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}},
    e(Spinner,{size:42}), e('p',{style:{color:'var(--slate)'}}, 'Loading property…')
  );
  if (!prop) return e('div', {style:{minHeight:'100vh',paddingTop:120,textAlign:'center',padding:'120px 24px'}},
    e('h2',{},'Property not found'), e('button',{className:'btn btn-primary',style:{marginTop:20},onClick:()=>nav('search')},'Back to Search')
  );

  const isRent = prop.category==='rent';
  const isLand = prop.type==='Land'||prop.type==='Agricultural Land';
  const scoreRows = [{label:'Price Match',val:prop.scores?.priceScore||0,color:'var(--v)'},{label:'Location Score',val:prop.scores?.distanceScore||0,color:'var(--go)'},{label:'Amenities',val:prop.scores?.amenityScore||0,color:'var(--amber)'}];

  // Modal component
  const Modal = ({show, onClose, title, children}) => !show ? null : e('div', {className:'overlay', onClick:onClose},
    e('div', {className:'card overlay-card scale-in', onClick:ev=>ev.stopPropagation()},
      e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}},
        e('h2', {style:{margin:0,fontSize:22,fontWeight:800,letterSpacing:'-.03em'}}, title),
        e('button', {onClick:onClose, style:{background:'none',border:'none',color:'var(--slate)',cursor:'pointer',fontSize:22}}, '✕')
      ),
      children
    )
  );

  return e('div', {style:{minHeight:'100vh',paddingTop:'var(--nav)',background:'var(--surface)'}},
    // Breadcrumb
    e('div', {style:{background:'#fff',borderBottom:'1px solid var(--border)',padding:'12px 24px'}},
      e('div', {style:{maxWidth:1280,margin:'0 auto',display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--slate)',flexWrap:'wrap'}},
        e('button', {onClick:()=>nav('search'), style:{background:'none',border:'none',color:'var(--v)',cursor:'pointer',fontWeight:700,fontFamily:'var(--font)'}}, '← Search'),
        e('span',{}, '/'), e('span',{}, prop.state), e('span',{}, '/'), e('span',{}, prop.city), e('span',{}, '/'),
        e('span', {style:{color:'var(--ink)',fontWeight:700}}, prop.title)
      )
    ),

    e('div', {style:{maxWidth:1280,margin:'0 auto',padding:'32px 24px'}},
      e('div', {style:{display:'grid',gridTemplateColumns:'1fr minmax(0,370px)',gap:32,alignItems:'start'}, className:'g2-col'},

        // Left column
        e('div', {},
          // Hero image
          e('div', {style:{borderRadius:24,overflow:'hidden',position:'relative',height:440,marginBottom:14}},
            e('img', {src:prop.images?.[imgIdx]||prop.image, alt:prop.title, style:{width:'100%',height:'100%',objectFit:'cover',display:'block'}, onError:ev=>ev.target.src='https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=700&q=80'}),
            e('div', {style:{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,.58) 0%,transparent 50%)'}}),
            e('div', {style:{position:'absolute',top:16,left:16,display:'flex',gap:8,flexWrap:'wrap'}},
              e('span', {className:'badge '+(TYPE_CLS[prop.type]||'badge-v')}, (TYPE_ICO[prop.type]||'🏠')+' '+prop.type),
              isRent && e('span', {className:'badge badge-orange'}, 'RENT'),
              prop.isUserListing && e('span', {className:'badge badge-go'}, '✓ User Listed')
            ),
            e('div', {style:{position:'absolute',top:14,right:14,display:'flex',gap:8}},
              e('button', {onClick:async()=>{if(!user){toast('Sign in','warning');return;}await toggleSave(prop.id);toast(saved?'Removed':'Saved! ❤',saved?'info':'success');}, style:{width:38,height:38,background:'rgba(255,255,255,.92)',border:'none',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:20,color:saved?'var(--red)':'var(--slate)'}}, saved?'❤':'♡'),
              e('button', {onClick:toggleComp, style:{width:38,height:38,background:inComp?'var(--v)':'rgba(255,255,255,.92)',border:'none',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:18,color:inComp?'#fff':'var(--slate)'}}, '⚖')
            ),
            e('div', {style:{position:'absolute',bottom:20,left:20}},
              e('div', {style:{fontSize:13,color:'rgba(255,255,255,.8)',marginBottom:5}}, '📍 '+prop.location+', '+prop.state),
              e('h1', {style:{fontSize:'clamp(20px,3vw,32px)',fontWeight:900,color:'#fff',margin:0,letterSpacing:'-.03em',textShadow:'0 2px 12px rgba(0,0,0,.4)'}}, prop.title)
            )
          ),
          // Thumbnails
          prop.images?.length > 1 && e('div', {style:{display:'flex',gap:10,marginBottom:28,overflowX:'auto'}},
            prop.images.map((img,i) => e('div', {key:i, onClick:()=>setImgIdx(i), style:{width:80,height:60,borderRadius:10,overflow:'hidden',cursor:'pointer',border:'2.5px solid '+(imgIdx===i?'var(--v)':'transparent'),flexShrink:0,opacity:imgIdx===i?1:.65,transition:'all .2s'}},
              e('img', {src:img, alt:'', style:{width:'100%',height:'100%',objectFit:'cover',display:'block'}})
            ))
          ),

          // Quick stats
          e('div', {style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:28}},
            [...(isLand?[['🌍','Land Area',prop.landArea?(prop.landArea.toLocaleString()+' sqm'):'N/A']]:
              [['🛏','Bedrooms',prop.bedrooms],['🚿','Bathrooms',prop.bathrooms]]),
              prop.area>0?['📐','Area',prop.area.toLocaleString()+' sqft']:['🏛','Type',prop.type],
              ['📍','Distance',prop.distance+'km']
            ].map(([ic,l,v]) => e('div', {key:l, className:'card', style:{padding:'18px 14px',textAlign:'center'}},
              e('div', {style:{fontSize:22,marginBottom:8}}, ic),
              e('div', {style:{fontSize:20,fontWeight:800,color:'var(--ink)',letterSpacing:'-.04em'}}, v),
              e('div', {style:{fontSize:10,color:'var(--muted)',marginTop:3,fontWeight:700,textTransform:'uppercase',letterSpacing:.5}}, l)
            ))
          ),

          // Description
          e('div', {className:'card', style:{padding:28,marginBottom:24}},
            e('h3', {style:{fontSize:19,fontWeight:700,color:'var(--ink)',marginBottom:14,letterSpacing:'-.02em'}}, 'About This Property'),
            e('p', {style:{color:'var(--slate)',lineHeight:1.9,fontSize:15,margin:'0 0 20px'}}, prop.description),
            e('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr'}},
              [['State',prop.state],['City',prop.city],['Year Built',prop.yearBuilt||'—'],['Floor',prop.floor||'—'],['Facing',prop.facing||'—'],['Listing',prop.category==='rent'?'For Rent':'For Sale']].map(([k,v]) =>
                e('div', {key:k, style:{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #f1f5f9',fontSize:14}},
                  e('span', {style:{color:'var(--slate)'}}, k),
                  e('span', {style:{fontWeight:700,color:'var(--ink)'}}, v)
                )
              )
            )
          ),

          // Amenities
          prop.amenities?.length > 0 && e('div', {className:'card', style:{padding:28,marginBottom:24}},
            e('h3', {style:{fontSize:19,fontWeight:700,color:'var(--ink)',marginBottom:16}}, 'Amenities & Features'),
            e('div', {style:{display:'flex',flexWrap:'wrap',gap:12}},
              prop.amenities.map(a => e('div', {key:a, style:{display:'flex',alignItems:'center',gap:10,background:'var(--vxx)',border:'1.5px solid rgba(99,102,241,.18)',borderRadius:12,padding:'10px 18px'}},
                e('span', {style:{fontSize:20}}, AMN[a]||'✦'),
                e('span', {style:{fontSize:14,fontWeight:600,color:'var(--vd)',textTransform:'capitalize'}}, a)
              ))
            )
          ),

          // Agent
          e('div', {className:'card', style:{padding:28,marginBottom:24}},
            e('h3', {style:{fontSize:19,fontWeight:700,color:'var(--ink)',marginBottom:16}}, prop.isUserListing?'🧑 Property Owner':'🏢 Agent Details'),
            e('div', {style:{display:'flex',alignItems:'center',gap:16}},
              e('div', {style:{width:56,height:56,background:'linear-gradient(135deg,var(--v),#8b5cf6)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,color:'#fff',fontWeight:800,flexShrink:0}}, prop.agent?.name?.[0]||'?'),
              e('div', {style:{flex:1}},
                e('div', {style:{fontWeight:700,color:'var(--ink)',fontSize:16,marginBottom:4}}, prop.agent?.name),
                e(Stars, {rating:prop.agent?.rating||4.5}),
                e('div', {style:{fontSize:12,color:'var(--slate)',marginTop:3}}, (prop.agent?.rating||4.5)+' · '+(prop.isUserListing?'Property Owner':'Verified Agent')+' ✓')
              ),
              e('a', {href:'tel:'+(prop.agent?.phone||''), className:'btn btn-secondary btn-sm'}, '📞 Call')
            )
          ),

          // Map placeholder
          e('div', {style:{borderRadius:20,background:'linear-gradient(135deg,var(--vxx),#ede9fe)',height:180,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10,border:'2px solid rgba(99,102,241,.2)',marginBottom:24}},
            e('span', {style:{fontSize:44}}, '📍'),
            e('div', {style:{textAlign:'center'}},
              e('p', {style:{margin:0,fontWeight:700,color:'var(--vd)',fontSize:17}}, prop.location),
              e('p', {style:{margin:'4px 0 0',color:'var(--v)',fontSize:12}}, prop.state+' · Lat:'+prop.lat+'° Lng:'+prop.lng+'°')
            )
          ),

          // Reviews
          e('div', {className:'card', style:{padding:28}},
            e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}},
              e('h3', {style:{fontSize:19,fontWeight:700,color:'var(--ink)',margin:0}},
                'Reviews ', prop.avgRating && e('span', {style:{fontSize:15,color:'var(--amber)',fontWeight:600}}, '★ '+prop.avgRating)
              ),
              user && e('button', {className:'btn btn-secondary btn-sm', onClick:()=>setShowRev(true)}, '+ Write Review')
            ),
            !prop.reviews?.length
              ? e('div', {style:{textAlign:'center',padding:'28px 0',color:'var(--muted)'}}, e('div',{style:{fontSize:40,marginBottom:8}},'💬'), e('p',{},'No reviews yet. Be the first!'), !user&&e('button',{className:'btn btn-primary btn-sm',style:{marginTop:12},onClick:()=>nav('auth')},'Sign In to Review'))
              : prop.reviews.map(r => e('div', {key:r.id, style:{borderBottom:'1px solid #f1f5f9',paddingBottom:18,marginBottom:18}},
                  e('div', {style:{display:'flex',alignItems:'center',gap:10,marginBottom:8}},
                    e('div', {style:{width:36,height:36,background:'linear-gradient(135deg,var(--v),#8b5cf6)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:13}}, r.userName?.[0]||'U'),
                    e('div', {}, e('div',{style:{fontWeight:700,color:'var(--ink)',fontSize:14}},r.userName), e(Stars,{rating:r.rating,size:12})),
                    e('span', {style:{marginLeft:'auto',fontSize:11,color:'var(--muted)'}}, new Date(r.createdAt).toLocaleDateString())
                  ),
                  e('p', {style:{margin:0,color:'var(--slate)',fontSize:14,lineHeight:1.8}}, r.comment)
                ))
          )
        ),

        // Right sidebar
        e('div', {},
          e('div', {className:'card', style:{padding:28,position:'sticky',top:88}},
            e('div', {style:{fontSize:isRent?24:32,fontWeight:900,color:'var(--ink)',marginBottom:isRent?6:3,letterSpacing:'-.04em'}}, isRent?fmtRent(prop.price):fmt(prop.price)),
            !isRent && prop.area>0 && e('div', {style:{color:'var(--slate)',fontSize:13,marginBottom:24}}, '₹'+Math.round(prop.price/prop.area).toLocaleString()+' per sqft'),
            isRent && e('div', {style:{color:'var(--amber)',fontSize:13,fontWeight:600,marginBottom:24}}, '🏷 Monthly Rent'),

            e('div', {style:{background:'var(--surface)',borderRadius:16,padding:20,marginBottom:20}},
              e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}},
                e('span', {style:{fontWeight:700,color:'var(--ink)',fontSize:15}}, 'Match Score'),
                e(ScoreRing, {score:prop.scores?.total||0, size:58})
              ),
              scoreRows.map(s => e('div', {key:s.label, style:{marginBottom:13}},
                e('div', {style:{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:13}},
                  e('span', {style:{color:'var(--slate)'}}, s.label),
                  e('span', {style:{fontWeight:700,color:s.color,fontSize:12}}, s.val+'/100')
                ),
                e('div', {className:'prog'}, e('div', {className:'prog-fill', style:{width:s.val+'%',background:s.color}}))
              ))
            ),

            e('button', {className:'btn btn-primary btn-lg', style:{width:'100%',marginBottom:10}, onClick:()=>{if(!user){toast('Sign in to enquire','warning');nav('auth');return;}setShowEnq(true);}},
              '📅 '+(isRent?'Apply / Enquire':'Schedule a Visit')
            ),
            e('button', {className:'btn btn-secondary', style:{width:'100%',marginBottom:10}, onClick:toggleComp}, '⚖ '+(inComp?'Remove from Compare':'Add to Compare')),
            compareList.length>=2 && e('button', {className:'btn btn-ghost', style:{width:'100%',marginBottom:10}, onClick:()=>nav('compare')}, 'View Comparison ('+compareList.length+')'),
            e('button', {className:'btn btn-ghost btn-sm', style:{width:'100%'}, onClick:async()=>{if(!user){toast('Sign in','warning');return;}await toggleSave(prop.id);toast(saved?'Removed':'Saved! ❤',saved?'info':'success');}},
              (saved?'❤ Remove from Saved':'♡ Save Property')
            ),

            e('div', {style:{marginTop:20,paddingTop:18,borderTop:'1px solid #f1f5f9'}},
              [['🌏','State',prop.state],['🏙','City',prop.city],['👁','Views',prop.views?.toLocaleString()||'0'],['🏛','Floor',prop.floor||'—']].map(([ic,l,v]) =>
                e('div', {key:l, style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,fontSize:13}},
                  e('span', {style:{color:'var(--slate)'}}, ic+' '+l),
                  e('span', {style:{fontWeight:700,color:'var(--ink)',fontSize:12}}, v)
                )
              )
            )
          )
        )
      )
    ),

    // Enquiry Modal
    e(Modal, {show:showEnq, onClose:()=>setShowEnq(false), title:'📅 '+(isRent?'Apply / Enquire':'Schedule a Visit')},
      e('div', {style:{background:'var(--vxx)',borderRadius:14,padding:14,marginBottom:20,display:'flex',gap:12,alignItems:'center'}},
        e('img', {src:prop.image, alt:'', style:{width:64,height:64,objectFit:'cover',borderRadius:10,flexShrink:0}, onError:ev=>ev.target.style.display='none'}),
        e('div', {},
          e('div', {style:{fontWeight:700,color:'var(--ink)',fontSize:15}}, prop.title),
          e('div', {style:{fontSize:13,color:'var(--slate)',marginTop:2}}, prop.location+', '+prop.state),
          e('div', {style:{fontSize:17,fontWeight:800,color:'var(--v)',marginTop:4}}, isRent?fmtRent(prop.price):fmt(prop.price))
        )
      ),
      e('label', {className:'label'}, 'Preferred Visit Date'),
      e('input', {className:'input', type:'date', value:enq.visitDate, onChange:ev=>setEnq({...enq,visitDate:ev.target.value}), style:{marginBottom:16}, min:new Date().toISOString().split('T')[0]}),
      e('label', {className:'label'}, 'Your Message'),
      e('textarea', {className:'input', rows:4, placeholder:'Hi, I am interested in this property…', value:enq.message, onChange:ev=>setEnq({...enq,message:ev.target.value}), style:{resize:'vertical',marginBottom:20}}),
      e('button', {className:'btn btn-primary btn-lg', style:{width:'100%'}, onClick:submitEnq, disabled:submitting},
        submitting ? e(Spinner,{size:18,color:'#fff'}) : '📤 Send Enquiry'
      )
    ),

    // Review Modal
    e(Modal, {show:showRev, onClose:()=>setShowRev(false), title:'★ Write a Review'},
      e('label', {className:'label'}, 'Your Rating'),
      e('div', {style:{display:'flex',gap:8,marginBottom:20}},
        [1,2,3,4,5].map(n => e('button', {key:n, onClick:()=>setRev({...rev,rating:n}), style:{background:'none',border:'none',fontSize:34,cursor:'pointer',color:n<=rev.rating?'#f59e0b':'#e5e7eb',transition:'all .12s',transform:n<=rev.rating?'scale(1.15)':'scale(1)'}}, '★'))
      ),
      e('label', {className:'label'}, 'Your Review'),
      e('textarea', {className:'input', rows:4, placeholder:'Share your experience…', value:rev.comment, onChange:ev=>setRev({...rev,comment:ev.target.value}), style:{resize:'vertical',marginBottom:20}}),
      e('button', {className:'btn btn-primary btn-lg', style:{width:'100%'}, onClick:submitRev, disabled:submitting},
        submitting ? e(Spinner,{size:18,color:'#fff'}) : '★ Post Review'
      )
    ),

    e(Footer, {nav})
  );
}

// ─── COMPARE PAGE ──────────────────────────────────────────
function ComparePage({compareList, setCompareList, nav}) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (compareList.length < 2) { setLoading(false); return; }
    apiFetch('/compare', {method:'POST', body:{ids:compareList.map(p=>p.id)}}).then(setData).catch(()=>{}).finally(()=>setLoading(false));
  }, [compareList]);

  const ScoreBar = ({val, color}) => e('div', {style:{display:'flex',alignItems:'center',gap:8,width:'100%'}},
    e('div', {className:'prog', style:{flex:1}}, e('div', {className:'prog-fill', style:{width:val+'%',background:color}})),
    e('span', {style:{fontSize:12,fontWeight:700,color,minWidth:28}}, val)
  );

  const rows = [
    {l:'Price', fn:p=>e('span',{style:{fontSize:16,fontWeight:800,color:'var(--v)'}}, p.category==='rent'?fmtRent(p.price):fmt(p.price))},
    {l:'State', fn:p=>e('span',{className:'badge badge-v'}, p.state)},
    {l:'Type', fn:p=>e('span',{className:'badge '+(TYPE_CLS[p.type]||'badge-v')}, (TYPE_ICO[p.type]||'🏠')+' '+p.type)},
    {l:'Category', fn:p=>e('span',{className:'badge '+(p.category==='rent'?'badge-orange':'badge-go')}, p.category==='buy'?'For Sale':'For Rent')},
    {l:'Location', fn:p=>e('span',{style:{fontSize:12}}, p.location)},
    {l:'City', fn:p=>p.city}, {l:'Distance', fn:p=>p.distance+' km'},
    {l:'BHK', fn:p=>p.bedrooms>0?e('span',{style:{fontWeight:700}},p.bedrooms):'N/A'},
    {l:'Bathrooms', fn:p=>p.bathrooms>0?e('span',{style:{fontWeight:700}},p.bathrooms):'N/A'},
    {l:'Area', fn:p=>p.area>0?p.area.toLocaleString()+' sqft':'N/A'},
    {l:'₹/sqft', fn:p=>p.area>0?'₹'+Math.round(p.price/p.area).toLocaleString():'N/A'},
    {l:'Year', fn:p=>p.yearBuilt||'—'}, {l:'Floor', fn:p=>p.floor||'—'}, {l:'Facing', fn:p=>p.facing||'—'},
    {l:'Match Score', fn:p=>e(ScoreRing,{score:p.scores?.total||0,size:48})},
    {l:'Price Match', fn:p=>e(ScoreBar,{val:p.scores?.priceScore||0,color:'var(--v)'})},
    {l:'Location', fn:p=>e(ScoreBar,{val:p.scores?.distanceScore||0,color:'var(--go)'})},
    {l:'Amenities', fn:p=>e(ScoreBar,{val:p.scores?.amenityScore||0,color:'var(--amber)'})},
    ...['pool','gym','garden','parking','security','elevator'].map(a => ({
      l: a.charAt(0).toUpperCase()+a.slice(1),
      fn: p => p.amenities?.includes(a) ? e('span',{style:{color:'var(--go)',fontSize:20}},'✓') : e('span',{style:{color:'var(--red)',opacity:.4,fontSize:18}},'✕')
    }))
  ];

  if (compareList.length < 2) return e('div', {style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,textAlign:'center',padding:'80px 24px',paddingTop:120}},
    e('div',{style:{fontSize:64}},'⚖️'),
    e('h2',{style:{fontSize:28,fontWeight:800,color:'var(--ink)',letterSpacing:'-.03em'}},'Nothing to Compare'),
    e('p',{style:{color:'var(--slate)',maxWidth:360,lineHeight:1.7}},'Add at least 2 properties from the search results using the ⚖ icon to start a side-by-side comparison.'),
    e('button',{className:'btn btn-primary btn-lg',onClick:()=>nav('search')},'Browse Properties')
  );

  return e('div', {style:{minHeight:'100vh',paddingTop:'var(--nav)',background:'var(--surface)'}},
    e('div', {style:{maxWidth:1280,margin:'0 auto',padding:'32px 24px'}},
      e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:28,flexWrap:'wrap',gap:12}},
        e('div', {},
          e('h1', {style:{margin:0,fontSize:28,fontWeight:800,color:'var(--ink)',letterSpacing:'-.03em'}}, 'Property Comparison'),
          e('p', {style:{margin:'6px 0 0',color:'var(--slate)'}}, 'Comparing '+(data.length||compareList.length)+' properties side-by-side')
        ),
        e('div', {style:{display:'flex',gap:10}},
          e('button', {className:'btn btn-ghost btn-sm', onClick:()=>nav('search')}, '← Search'),
          e('button', {className:'btn btn-danger btn-sm', onClick:()=>{setCompareList([]);toast('Cleared','info');nav('search');}}, '✕ Clear')
        )
      ),

      loading ? e('div',{style:{textAlign:'center',padding:60}},e(Spinner,{size:36})) :
      e('div', {className:'card', style:{overflow:'hidden',overflowX:'auto'}},
        e('div', {style:{display:'grid',gridTemplateColumns:'190px repeat('+data.length+',1fr)',background:'linear-gradient(135deg,var(--ink2),#252542)',minWidth:500}},
          e('div', {style:{padding:'24px 20px',display:'flex',alignItems:'center'}}, e('span',{style:{color:'#475569',fontWeight:700,fontSize:11,textTransform:'uppercase',letterSpacing:1}},'Feature')),
          data.map((p,i) => e('div', {key:p.id, style:{padding:'20px 16px',borderLeft:'1px solid rgba(255,255,255,.06)',position:'relative',minWidth:200}},
            i===0 && e('div', {style:{position:'absolute',top:10,right:10,background:'var(--amber)',color:'#fff',fontSize:10,fontWeight:800,borderRadius:6,padding:'2px 8px'}}, 'TOP PICK'),
            e('img', {src:p.image, alt:p.title, style:{width:'100%',height:90,objectFit:'cover',borderRadius:12,marginBottom:10,display:'block'}, onError:ev=>ev.target.style.display='none'}),
            e('div', {style:{color:'#fff',fontWeight:700,fontSize:14,marginBottom:4}}, p.title),
            e('div', {style:{color:'#64748b',fontSize:12,marginBottom:8}}, p.city+', '+p.state),
            e('button', {onClick:()=>{setCompareList(compareList.filter(x=>x.id!==p.id));toast('Removed','info');}, style:{background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.25)',color:'#fca5a5',borderRadius:6,padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'var(--font)'}}, 'Remove')
          ))
        ),
        rows.map((row,ri) => e('div', {key:row.l, style:{display:'grid',gridTemplateColumns:'190px repeat('+data.length+',1fr)',background:ri%2===0?'#fff':'var(--surface)',borderBottom:'1px solid #f1f5f9',minWidth:500}},
          e('div', {style:{padding:'13px 20px',display:'flex',alignItems:'center',fontWeight:700,fontSize:13,color:'var(--ink2)'}}, row.l),
          data.map(p => e('div', {key:p.id, style:{padding:'13px 16px',borderLeft:'1px solid #f1f5f9',display:'flex',alignItems:'center',fontSize:14,color:'var(--ink)',fontWeight:500,minWidth:200}}, row.fn(p)))
        ))
      )
    ),
    e(Footer, {nav})
  );
}

// ─── SAVED PAGE ────────────────────────────────────────────
function SavedPage({nav, setDetail, compareList, setCompareList}) {
  const {user} = useAuth();
  const [props, setProps] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!user) { setLoading(false); return; }
    apiFetch('/user/saved').then(setProps).catch(()=>{}).finally(()=>setLoading(false));
  }, [user]);

  if (!user) return e('div', {style:{minHeight:'100vh',paddingTop:120,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:14,textAlign:'center',padding:'120px 24px'}},
    e('div',{style:{fontSize:60}},'❤️'),
    e('h2',{style:{fontSize:26,fontWeight:800,letterSpacing:'-.03em'}},'Save Your Favourites'),
    e('p',{style:{color:'var(--slate)',maxWidth:340,lineHeight:1.7}},'Sign in to save properties and access them anytime.'),
    e('button',{className:'btn btn-primary btn-lg',onClick:()=>nav('auth')},'Sign In')
  );

  const toggleCo = prop => {
    if (compareList.find(p=>p.id===prop.id)) { setCompareList(compareList.filter(p=>p.id!==prop.id)); return; }
    if (compareList.length>=3) { toast('Max 3','error'); return; }
    setCompareList([...compareList,prop]); toast('Added ✓','success');
  };

  return e('div', {style:{minHeight:'100vh',paddingTop:'calc(var(--nav) + 24px)',background:'var(--surface)'}},
    e('div', {style:{maxWidth:1200,margin:'0 auto',padding:'24px'}},
      e('h1', {style:{fontSize:28,fontWeight:800,color:'var(--ink)',marginBottom:6,letterSpacing:'-.03em'}}, '❤ Saved Properties'),
      e('p', {style:{color:'var(--slate)',marginBottom:32}}, props.length+' saved'),
      loading ? e('div',{className:'g3'},[1,2,3].map(i=>e(SkeletonCard,{key:i}))) :
      props.length===0 ? e('div',{style:{textAlign:'center',padding:'60px 20px',color:'var(--slate)'}},
        e('div',{style:{fontSize:60,marginBottom:14}},'🏠'),
        e('h3',{style:{fontSize:20,color:'var(--ink)',fontWeight:700}},'No saved properties'),
        e('p',{style:{marginTop:8}},'Tap ❤ on any property to save it here.'),
        e('button',{className:'btn btn-primary',style:{marginTop:20},onClick:()=>nav('search')},'Browse Properties')
      ) :
      e('div', {className:'g3'},
        props.map(p => e(PropertyCard, {key:p.id, prop:p, onView:()=>{setDetail(p);nav('details');}, onCompare:()=>toggleCo(p), inComp:!!compareList.find(x=>x.id===p.id)}))
      )
    ),
    e(Footer, {nav})
  );
}

// ─── PROFILE PAGE ──────────────────────────────────────────
function ProfilePage({nav}) {
  const {user, logout} = useAuth();
  const [enquiries, setEnquiries] = useState([]);
  const [listings, setListings] = useState([]);
  const [tab, setTab] = useState('enquiries');
  const [deletingId, setDeletingId] = useState(null);

  useEffect(() => {
    if (!user) { nav('auth'); return; }
    apiFetch('/user/enquiries').then(setEnquiries).catch(()=>{});
    apiFetch('/user/listings').then(setListings).catch(()=>{});
  }, [user]);

  const deleteListing = async id => {
    if (!confirm('Delete this listing?')) return;
    setDeletingId(id);
    try { await apiFetch('/list-property/'+id, {method:'DELETE'}); setListings(listings.filter(l=>l.id!==id)); toast('Listing deleted','info'); }
    catch(err) { toast(err.message,'error'); }
    finally { setDeletingId(null); }
  };

  if (!user) return null;

  return e('div', {style:{minHeight:'100vh',paddingTop:'calc(var(--nav) + 32px)',background:'var(--surface)'}},
    e('div', {style:{maxWidth:900,margin:'0 auto',padding:'0 24px 60px'}},
      e('div', {className:'card fade-up', style:{padding:'28px 32px',marginBottom:24,display:'flex',gap:24,alignItems:'center',flexWrap:'wrap'}},
        e('div', {style:{width:80,height:80,background:'linear-gradient(135deg,var(--v),#8b5cf6)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,color:'#fff',fontWeight:900,flexShrink:0}}, user.name[0]),
        e('div', {style:{flex:1}},
          e('h1', {style:{margin:0,fontSize:24,fontWeight:800,color:'var(--ink)',letterSpacing:'-.03em'}}, user.name),
          e('p', {style:{margin:'5px 0 12px',color:'var(--slate)',fontSize:15}}, user.email),
          e('div', {style:{display:'flex',gap:10,flexWrap:'wrap'}},
            e('span',{className:'badge badge-go'},'✓ Verified'),
            e('span',{className:'badge badge-v'},'Member'),
            listings.length>0 && e('span',{className:'badge badge-orange'},'📤 '+listings.length+' Listing'+(listings.length>1?'s':''))
          )
        ),
        e('div', {style:{display:'flex',gap:8,flexWrap:'wrap'}},
          e('button',{className:'btn btn-success btn-sm',onClick:()=>nav('sell')},'📤 New Listing'),
          e('button',{className:'btn btn-danger btn-sm',onClick:()=>{logout();toast('Signed out 👋','info');nav('home');}},'Sign Out')
        )
      ),

      e('div', {className:'tabs', style:{marginBottom:24}},
        [['enquiries','📋 Enquiries ('+enquiries.length+')'],['listings','📤 Listings ('+listings.length+')'],['account','👤 Account']].map(([t,l])=>
          e('button',{key:t,className:'tab '+(tab===t?'tab-on':'tab-off'),onClick:()=>setTab(t)},l)
        )
      ),

      tab==='enquiries' && (enquiries.length===0
        ? e('div',{className:'card',style:{padding:'48px 24px',textAlign:'center',color:'var(--slate)'}},
            e('div',{style:{fontSize:48,marginBottom:12}},'📋'),
            e('h3',{style:{color:'var(--ink)',marginBottom:8,fontWeight:700}},'No enquiries yet'),
            e('p',{},'Schedule visits on property detail pages.'),
            e('button',{className:'btn btn-primary',style:{marginTop:20},onClick:()=>nav('search')},'Browse Properties')
          )
        : e('div',{style:{display:'flex',flexDirection:'column',gap:16}},
            enquiries.map(enq => e('div',{key:enq.id,className:'card fade-up',style:{padding:'22px 26px'}},
              e('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:8,flexWrap:'wrap'}},
                e('h3',{style:{margin:0,fontSize:16,fontWeight:700,color:'var(--ink)'}},enq.propertyTitle),
                e('span',{className:'badge '+(enq.status==='pending'?'badge-amber':'badge-go')},enq.status)
              ),
              e('p',{style:{color:'var(--slate)',fontSize:14,margin:'0 0 8px',lineHeight:1.7}},enq.message),
              e('div',{style:{display:'flex',gap:16,fontSize:12,color:'var(--muted)',flexWrap:'wrap'}},
                enq.visitDate && e('span',{},'📅 '+new Date(enq.visitDate).toLocaleDateString()),
                e('span',{},'Sent: '+new Date(enq.createdAt).toLocaleDateString())
              )
            ))
          )
      ),

      tab==='listings' && (listings.length===0
        ? e('div',{className:'card',style:{padding:'48px 24px',textAlign:'center',color:'var(--slate)'}},
            e('div',{style:{fontSize:48,marginBottom:12}},'📤'),
            e('h3',{style:{color:'var(--ink)',marginBottom:8,fontWeight:700}},'No active listings'),
            e('p',{},'List your property or land for free.'),
            e('button',{className:'btn btn-success',style:{marginTop:20},onClick:()=>nav('sell')},'📤 List Property')
          )
        : e('div',{style:{display:'flex',flexDirection:'column',gap:16}},
            listings.map(l => e('div',{key:l.id,className:'card fade-up',style:{padding:'22px 26px',display:'flex',gap:16,alignItems:'flex-start',flexWrap:'wrap'}},
              e('img',{src:l.image,alt:'',style:{width:90,height:70,objectFit:'cover',borderRadius:12,flexShrink:0},onError:ev=>ev.target.style.display='none'}),
              e('div',{style:{flex:1}},
                e('div',{style:{display:'flex',justifyContent:'space-between',gap:8,flexWrap:'wrap',marginBottom:8}},
                  e('div',{},
                    e('h3',{style:{margin:0,fontSize:16,fontWeight:700,color:'var(--ink)'}},l.title),
                    e('p',{style:{color:'var(--slate)',fontSize:13,margin:'4px 0 0'}},'📍 '+l.location+', '+l.state)
                  ),
                  e('div',{style:{textAlign:'right'}},
                    e('div',{style:{fontSize:18,fontWeight:800,color:'var(--v)'}},l.category==='rent'?fmtRent(l.price):fmt(l.price)),
                    e('span',{className:'badge badge-go',style:{marginTop:4}},'✓ Active')
                  )
                ),
                e('span',{className:'badge '+(TYPE_CLS[l.type]||'badge-v')},(TYPE_ICO[l.type]||'🏠')+' '+l.type)
              ),
              e('div',{style:{display:'flex',gap:8,flexDirection:'column'}},
                e('button',{className:'btn btn-secondary btn-sm',onClick:()=>{nav('details',l);}},'View'),
                e('button',{className:'btn btn-danger btn-sm',onClick:()=>deleteListing(l.id),disabled:deletingId===l.id},
                  deletingId===l.id ? e(Spinner,{size:14}) : 'Delete'
                )
              )
            ))
          )
      ),

      tab==='account' && e('div',{className:'card',style:{padding:'28px 32px'}},
        e('h3',{style:{fontWeight:700,fontSize:18,marginBottom:20,letterSpacing:'-.02em'}},'Account Information'),
        [['Full Name',user.name],['Email',user.email],['Member Since',user.createdAt?new Date(user.createdAt).toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'}):'—'],['Account ID',user.id]].map(([k,v])=>
          e('div',{key:k,style:{display:'flex',justifyContent:'space-between',padding:'14px 0',borderBottom:'1px solid #f1f5f9',fontSize:14}},
            e('span',{style:{color:'var(--slate)',fontWeight:500}},k),
            e('span',{style:{fontWeight:700,color:'var(--ink)',fontSize:k==='Account ID'?11:14,maxWidth:'60%',textAlign:'right',wordBreak:'break-all'}},v)
          )
        ),
        e('div',{style:{marginTop:24,padding:20,background:'var(--amberx)',borderRadius:14,fontSize:13,color:'#92400e',lineHeight:1.7}},
          '⚠ PropFind is a demo platform. No real transactions or legal agreements are formed.'
        )
      )
    ),
    e(Footer, {nav})
  );
}

// ─── ROOT APP ──────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [user, setUser] = useState(null);
  const [savedIds, setSavedIds] = useState([]);
  const [compareList, setCompareList] = useState([]);
  const [detail, setDetail] = useState(null);
  const [searchQ, setSearchQ] = useState({});

  useEffect(() => {
    const token = localStorage.getItem('pf_token');
    if (token) {
      apiFetch('/auth/me').then(u => { setUser(u); setSavedIds(u.savedProperties||[]); }).catch(() => localStorage.removeItem('pf_token'));
    }
  }, []);

  const nav = (pg, prop) => {
    if (prop) setDetail(prop);
    setPage(pg);
    window.scrollTo({top:0, behavior:'smooth'});
  };

  const login = u => { setUser(u); setSavedIds(u.savedProperties||[]); };
  const logout = () => { setUser(null); setSavedIds([]); localStorage.removeItem('pf_token'); };
  const toggleSave = async id => { const data = await apiFetch('/properties/'+id+'/save', {method:'POST'}); setSavedIds(data.savedProperties); return data; };

  const authCtx = useMemo(() => ({user, login, logout, savedIds, toggleSave}), [user, savedIds]);

  return e(AuthCtx.Provider, {value: authCtx},
    e(Toasts),
    e(Navbar, {page, nav}),
    page==='home'    && e(HomePage,    {nav, setSearchQ}),
    page==='auth'    && e(AuthPage,    {nav}),
    page==='search'  && e(SearchPage,  {initQ:searchQ, compareList, setCompareList, nav, setDetail}),
    page==='sell'    && e(SellPage,    {nav}),
    page==='details' && detail && e(DetailsPage, {propId:detail.id, nav, compareList, setCompareList}),
    page==='compare' && e(ComparePage, {compareList, setCompareList, nav}),
    page==='saved'   && e(SavedPage,   {nav, setDetail, compareList, setCompareList}),
    page==='profile' && e(ProfilePage, {nav})
  );
}

// Mount app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
</html>
